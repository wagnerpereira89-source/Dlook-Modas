<!DOCTYPE html>

  a partir do src/config.js. NÃO edite este arquivo para trocar de cliente.
-->
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />

    <meta name="theme-color" content="%THEME_COLOR%" />
